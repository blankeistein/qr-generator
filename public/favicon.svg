<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Top-left QR position square -->
  <rect x="4" y="4" width="10" height="10" rx="1.5" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="7" y="7" width="4" height="4" rx="0.5" fill="#e2e8f0"/>

  <!-- Top-right QR position square -->
  <rect x="18" y="4" width="10" height="10" rx="1.5" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="21" y="7" width="4" height="4" rx="0.5" fill="#e2e8f0"/>

  <!-- Bottom-left QR position square -->
  <rect x="4" y="18" width="10" height="10" rx="1.5" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="7" y="21" width="4" height="4" rx="0.5" fill="#e2e8f0"/>

  <!-- Bottom-right data dots (accent color) -->
  <rect x="19" y="19" width="3" height="3" rx="0.5" fill="#38bdf8"/>
  <rect x="23" y="19" width="3" height="3" rx="0.5" fill="#38bdf8" opacity="0.5"/>
  <rect x="19" y="23" width="3" height="3" rx="0.5" fill="#38bdf8" opacity="0.5"/>
  <rect x="23" y="23" width="3" height="3" rx="0.5" fill="#38bdf8"/>
</svg>
